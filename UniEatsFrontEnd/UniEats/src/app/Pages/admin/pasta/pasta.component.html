<body class="content">
    <div class="item">
      <img src="pasta.jpg" alt="Pasta" class="item-image">
      <div class="item-details">
        <h2>Pasta</h2>
        <p class="price">Rs. 150</p>
        <p class="description">
          A dish of boiled pasta served with sauces such as tomato, cream, or pesto, and often mixed with ingredients like vegetables, meat, or seafood, topped with cheese and herbs.
        </p>
        <div class="quantity-selector">
          <button class="decrement">-</button>
          <input type="number" id="quantity" value="1" min="1">
          <button class="increment">+</button>
        </div>
        <div class="buttons">
          <button class="add-to-cart">Add to Cart</button>
          <button class="buy-now">Buy Now</button>
        </div>
      </div>
    </div>
  </body>
