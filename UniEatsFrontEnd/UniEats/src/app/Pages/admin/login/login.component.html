<div class="background-container">
  <div class="vw-100 vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 h-100">
      <div class="col-12 d-flex align-items-center justify-content-center position-relative">
        <div class="col-2">
        <h1 class="text-center text-primary mb-4" style="color: #E87605 !important;">UniEats</h1>  
        <div class="bg-white rounded-3 p-4 shadow-lg" style="z-index: 2; max-width: 450px; width: 100%; min-width: max-content;">
          <form class="login-form">
            <h2 class="text-warning text-center mb-4"><i class="fas fa-user-circle text-primary me-2"></i> Login</h2>
            <div class="mb-3 position-relative">
              <i class="fas fa-user icon position-absolute text-secondary" style="left: 15px; top: 12px;"></i>
              <input type="text" class="form-control ps-5" name="username" [(ngModel)]="loginObj.username"
                placeholder="Username" id="username" required>
            </div>
            <div class="mb-3 position-relative">
              <i class="fas fa-lock icon position-absolute text-secondary" style="left: 15px; top: 12px;"></i>
              <input type="password" class="form-control ps-5" name="password" [(ngModel)]="loginObj.password"
                placeholder="Password" id="password">
            </div>
            <div class="form-check mb-3 d-flex align-items-center">
              <input type="checkbox" class="form-check-input me-2" id="rememberMe">
              <label for="rememberMe" class="form-check-label">Remember me</label>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <i class="fab fa-google social-icon rounded-circle bg-danger text-white p-2"></i>
              <i class="fab fa-facebook-f social-icon rounded-circle bg-primary text-white p-2"></i>
              <i class="fab fa-twitter social-icon rounded-circle bg-info text-white p-2"></i>
            </div>
            <button type="button" class="btn w-100 py-2" style="background-color: #E87605; border-color: black;" (click)="onLogin()">Login</button>
            <div class="text-center mt-3">
              <a href="/forgot-password" class="text-decoration-none text-primary">Forgot Password?</a> |
              <a class="text-decoration-none text-primary" routerLink="/register">Register Now</a>
            </div>
          </form>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>
