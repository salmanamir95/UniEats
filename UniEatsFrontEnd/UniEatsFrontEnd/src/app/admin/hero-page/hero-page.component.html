<div class="container-fluid">
  <!-- Navbar -->
  <app-navbar-admin></app-navbar-admin>

  <!-- Hero Section with Key Metrics -->
  <div class="row mt-4">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-center">Total Users</h5>
          <p class="display-4 text-center">{{ totalUsers }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-center">Total Sales</h5>
          <p class="display-4 text-center">{{ totalSales | currency }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-center">Pending Orders</h5>
          <p class="display-4 text-center">{{ pendingOrders }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart Section: Sales Overview (Simple Bar Chart) -->
  <div class="row mt-4">
    <div class="col-12">
      <h3 class="text-center">Sales Overview</h3>
      <div class="chart-container">
        <!-- Simple Bar Chart -->
        <div class="bar-chart">
          <div *ngFor="let data of salesData" class="bar" [style.height.%]="data.sales / 200">
            <div class="bar-label">{{ data.month }}</div>
            <div class="bar-value">{{ data.sales | currency }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
