<app-navbar></app-navbar>

<div class="menu-grid" style="width: 100%; height: 85%;">
  <div *ngFor="let item of menuItems">
    <app-menu-item
      [name]="item.name"
      [price]="item.price"
      [imageUrl]="item.imageUrl"
      (addToCart)="addToCart(item)">
    </app-menu-item>
  </div>
</div>

<app-footer></app-footer>
