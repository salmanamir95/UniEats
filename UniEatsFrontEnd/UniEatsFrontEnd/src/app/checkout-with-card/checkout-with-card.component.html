<div class="checkout-with-card">
  <header class="header">
    <div class="overlap-header">
      <img class="user-icon" src="img/user-1.svg" />
      <h2>Checkout - Card Payment</h2>
    </div>
  </header>

  <div class="card-form-container">
    <label>Cardholder Name
      <input type="text" [(ngModel)]="cardDetails.cardholderName" required />
    </label>

    <label>Card Number
      <input type="text" [(ngModel)]="cardDetails.cardNumber" required />
    </label>

    <label>Expiration Date
      <input type="text" [(ngModel)]="cardDetails.expirationDate" placeholder="MM/YY" required />
    </label>

    <label>CVV
      <input type="text" [(ngModel)]="cardDetails.cvv" required />
    </label>

    <button (click)="completeCardPayment()">Submit Payment</button>
  </div>

  <footer class="footer">
    <p>© 2024 UniEats - All Rights Reserved</p>
  </footer>
</div>
