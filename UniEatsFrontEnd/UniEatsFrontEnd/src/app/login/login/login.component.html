<div class="login-form-container">
  <h1 class="text-center title-page text-bold">UniEats</h1>
  <div class="card-bg">

    <!-- Form Start -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" formControlName="email" placeholder="Enter your email" />
        <!-- Error message if the email is invalid -->
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger">
          <small *ngIf="loginForm.get('email')?.hasError('required')">Email is required.</small>
          <small *ngIf="loginForm.get('email')?.hasError('email')">Invalid email format.</small>
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" formControlName="password"
          placeholder="Enter your password" />
        <!-- Error message if the password is invalid -->
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger">
          <small *ngIf="loginForm.get('password')?.hasError('required')">Password is required.</small>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn w-100 button" [disabled]="loginForm.invalid">Login</button>

      <!-- Optional links -->
      <div class="mt-3 text-center">
        <a href="/signup">Don't have an account? Sign up</a>
      </div>
    </form>
    <!-- Form End -->
  </div>

</div>
