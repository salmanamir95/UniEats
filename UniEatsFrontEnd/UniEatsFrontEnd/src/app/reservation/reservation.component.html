<!-- reservation.component.html -->
<div class="reservation" data-color-mode="SDS-light">
  <div class="section">
    <img class="rectangle" src="img/rectangle-1.svg" />
    <img class="rectangle-2" src="img/rectangle-20.svg" />

    <div class="overlap-group-wrapper">
      <div class="overlap-group">
        <div class="text-wrapper-2">1</div>
      </div>
    </div>

    <div class="overlap-wrapper">
      <div class="overlap">
        <div class="text-wrapper-3">Cafetaria</div>
      </div>
    </div>

    <!-- Remaining tables -->
    <div class="div-wrapper">
      <div class="overlap-2">
        <div class="text-wrapper-2">2</div>
      </div>
    </div>
    <div class="frame-2">
      <div class="overlap-3">
        <div class="text-wrapper-2">3</div>
      </div>
    </div>
    <!-- Add similar blocks for other tables -->

    <div class="frame-29">
      <div class="overlap-4">
        <div class="rectangle-3"></div>
        <div class="text-wrapper-2">30</div>
      </div>
    </div>

    <div class="rectangle-wrapper">
      <div class="rectangle-4"></div>
    </div>

    <div class="frame-30">
      <div class="overlap-3">
        <div class="text-wrapper-2">31</div>
      </div>
    </div>

    <!-- Reservation Summary -->
    <div class="text-wrapper-4">Available</div>
    <div class="text-wrapper-5">Occupied</div>
    <div class="text-wrapper-6">Reservation</div>

    <img class="arrow-back" src="img/arrow-back.svg" />

    <button class="button">
      <div class="text-wrapper-7">Reserve</div>
    </button>

    <p class="tables-selected">
      <span class="span">Tables Selected<br /><br /></span>
      <span class="text-wrapper-8">Table 30</span>
    </p>
    <div class="text-wrapper-9">Selected</div>
  </div>
</div>
