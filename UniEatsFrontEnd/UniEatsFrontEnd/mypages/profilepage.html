<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniEats - User Profile</title>
  <link rel="stylesheet" href="profile.page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">UniEats</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Menu</a></li>
      <li><a href="#">Reservation</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="user-icon">
      <i class="fas fa-user"></i>
    </div>
  </nav>

  <main class="profile-section">
    <form id="profileForm" class="profile-form">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" placeholder="First Name" required>
      
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" placeholder="Last Name" required>
      
      <label for="phoneNumber">Phone Number</label>
      <input type="tel" id="phoneNumber" placeholder="Enter Number" required>
      
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="Enter Password" required>
      
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Enter Password" required>
      
      <div class="form-buttons">
        <button type="submit">Save</button>
        <button type="button" id="cancelButton">Cancel</button>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <p>Important Link</p>
        <ul>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
      </div>
      <div class="social-media">
        <p>Follow Us</p>
        <div class="social-icons">
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-tiktok"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
          <a href="#"><i class="fab fa-facebook"></i></a>
        </div>
      </div>
    </div>
    <p>&copy; 2024 All Rights Reserved</p>
  </footer>
  <script src="profile.page.ts"></script>
</body>
</html>
